name: Laicai
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  Laicai:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Laicai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linzixun.Laicai
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 用于选择账单截图或待编辑图片。
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 用于保存编辑后的图片到相册。
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: 用于将语音内容转换为记账草稿。
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 用于录入语音记账内容。
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    scheme:
      testTargets:
        - LaicaiTests
        - LaicaiUITests
  LaicaiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LaicaiTests
    dependencies:
      - target: Laicai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linzixun.LaicaiTests
        GENERATE_INFOPLIST_FILE: YES
  LaicaiUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: LaicaiUITests
    dependencies:
      - target: Laicai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.linzixun.LaicaiUITests
        GENERATE_INFOPLIST_FILE: YES
